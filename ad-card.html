<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>认知训练</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Ocean blue theme */
  --ocean:      #0ea5e9;       /* primary brand */
  --ocean-dk:   #0284c7;       /* darker shade for shadows/hover */
  --ocean-bg:   #f0f9ff;       /* very light ocean tint */
  --ocean-lt:   rgba(14,165,233,0.12);
  --bg:         #f0f9ff;       /* page bg = lightest ocean tint */
  --surf:       #ffffff;
  --surf2:      #e0f2fe;       /* ocean-tinted surface */
  --text:       #0c2340;       /* deep ocean text */
  --text2:      #4a7fa5;
  --text3:      #93c5d9;
  --bd:         rgba(14,165,233,0.15);
  --bd2:        rgba(14,165,233,0.28);
  --blue:       #0ea5e9;
  --blue-bg:    #e0f2fe;
  --blue-lt:    rgba(14,165,233,0.13);
  --green:      #059669;
  --green-bg:   #ecfdf5;
  --green-bd:   #6ee7b7;
  --diamond:    #0ea5e9;
  --diamond2:   #bae6fd;
  --r:          22px;
  --rsm:        16px;
  --sh:         0 1px 10px rgba(14,165,233,0.1), 0 3px 20px rgba(14,165,233,0.06);
}
html.dark {
  --ocean:      #38bdf8;
  --ocean-dk:   #0ea5e9;
  --ocean-bg:   #0c1e2e;
  --bg:         #071520;
  --surf:       #0d2035;
  --surf2:      #112840;
  --text:       #e0f2fe;
  --text2:      #7ec8e3;
  --text3:      #2d5a7a;
  --bd:         rgba(56,189,248,0.12);
  --bd2:        rgba(56,189,248,0.22);
  --blue:       #38bdf8;
  --blue-bg:    #112840;
  --blue-lt:    rgba(56,189,248,0.15);
  --green-bg:   #042014;
  --green-bd:   #065f46;
  --diamond:    #38bdf8;
  --diamond2:   #0c4a6e;
  --sh:         0 2px 20px rgba(0,0,0,0.5);
}

html, body { height:100%; overflow:hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system,'PingFang SC','Hiragino Sans GB',sans-serif;
  -webkit-font-smoothing: antialiased;
  height: 100dvh;
  position: relative;
}

/* ════════════════════════════════
   SCREENS — stacked, shown by class
   ════════════════════════════════ */
.screen {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center;
  opacity: 0; pointer-events: none;
  transition: opacity .25s, transform .25s;
  transform: translateX(30px);
}
.screen.active {
  opacity: 1; pointer-events: auto; transform: translateX(0);
}
.screen.exit-left {
  opacity: 0; transform: translateX(-30px);
}

/* ════════════════════════════════
   HOME SCREEN
   ════════════════════════════════ */
#screen-home { justify-content: flex-start; overflow: hidden; }

.home-scroll {
  flex: 1; width: 100%; max-width: 500px;
  overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 0 16px;
}

/* ── Ocean-blue top bar ── */
.home-topbar {
  width: 100%;
  padding: calc(10px + env(safe-area-inset-top, 44px)) 16px 14px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
  background: var(--bg);
}
.home-title {
  font-size: 24px; font-weight: 800; letter-spacing: -.4px;
  color: var(--ocean);
}
.home-title-wrap {
  display: flex; align-items: baseline; gap: 6px;
}
.home-version {
  font-size: 11px; font-weight: 600;
  color: var(--text3); letter-spacing: .02em;
  margin-bottom: 1px;
}
.home-refresh-btn {
  background: none; border: none; cursor: pointer; padding: 3px;
  -webkit-tap-highlight-color: transparent;
  color: var(--text3); display: flex; align-items: center;
  border-radius: 6px;
  transition: color .15s, transform .3s;
  align-self: center;
}
.home-refresh-btn:active { color: var(--ocean); }
.home-refresh-btn.spinning svg {
  animation: spin360 .6s ease-out;
}
@keyframes spin360 { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

/* Right icon cluster */
.home-icons {
  display: flex; align-items: center; gap: 2px;
}
.home-icon-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 6px 10px; border-radius: 100px;
  background: none; border: none; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background .15s;
}
.home-icon-btn:active { background: var(--surf2); }
.home-icon-emoji { font-size: 18px; line-height: 1; }
.home-icon-count {
  font-size: 14px; font-weight: 800;
  color: var(--ocean);
}
.home-icon-count.streak { color: #f97316; }

/* Gear button */
.home-gear-btn {
  padding: 6px 8px; border-radius: 100px;
  background: none; border: none; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  color: var(--text3);
  display: flex; align-items: center;
  transition: background .15s;
}
.home-gear-btn:active { background: var(--surf2); }

.home-section { width: 100%; padding: 16px 0 0; }

/* Deck cards */
.deck-grid {
  display: flex; flex-direction: column; gap: 0;
  background: var(--surf); border-radius: var(--r);
  overflow: hidden; border: 1px solid var(--bd); box-shadow: var(--sh);
}
.deck-card {
  background: var(--surf); cursor: pointer;
  -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  transition: background .12s;
  display: flex; align-items: center; padding: 20px 18px;
  border-bottom: 0.5px solid var(--bd);
}
.deck-card:last-child { border-bottom: none; }
.deck-card:active { background: var(--surf2); }
.deck-card.selected { background: var(--blue-bg); }
.deck-info { flex:1; min-width: 0; }
.deck-name { font-size: 18px; font-weight: 600; color: var(--text); transition: color .15s; }
.deck-card.selected .deck-name { color: var(--blue); }

/* Due / New count columns */
.deck-stats { display: flex; gap: 22px; align-items: center; flex-shrink: 0; }
.deck-stat  { display: flex; flex-direction: column; align-items: center; gap: 3px; min-width: 32px; }
.deck-stat-num { font-size: 18px; font-weight: 700; line-height: 1; }
.deck-stat-num.due  { color: var(--blue); }
.deck-stat-num.new-c{ color: var(--green); }
.deck-stat-lbl { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .04em; }

/* Start footer — browse (secondary) + start (primary) */
.home-footer {
  width: 100%; max-width: 500px; flex-shrink: 0;
  padding: 14px 16px calc(12px + env(safe-area-inset-bottom, 20px));
  background: var(--bg);
}
.footer-btns {
  display: flex; gap: 10px; align-items: stretch;
}
.browse-btn {
  flex: 1;          /* 1/3 of total width (1 vs 2) */
  height: 62px; border-radius: var(--r);
  border: 2px solid var(--bd2);
  background: var(--surf); color: var(--text2);
  font-family: inherit; font-size: 16px; font-weight: 700;
  cursor: pointer; outline: none;
  -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  transition: background .15s, transform .1s;
}
.browse-btn:active { transform: scale(.97); background: var(--surf2); }
.start-btn {
  flex: 2;          /* 2/3 of total width */
  height: 62px; border-radius: var(--r); border: none;
  background: var(--ocean); color: #fff;
  font-family: inherit; font-size: 18px; font-weight: 800;
  cursor: pointer; outline: none;
  -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  transition: transform .1s;
  box-shadow: 0 4px 0 var(--ocean-dk);
}
.start-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--ocean-dk); }

/* ════════════════════════════════
   QUIZ SCREEN
   ════════════════════════════════ */
#screen-quiz {
  overflow: hidden;
}

/* Top bar */
.bar {
  width:100%; max-width:500px;
  display:flex; align-items:center; gap:12px;
  padding: calc(10px + env(safe-area-inset-top, 44px)) 18px 14px;
  flex-shrink: 0;
}
.back-btn {
  background:none; border:none; cursor:pointer; padding:4px;
  -webkit-tap-highlight-color:transparent;
  color:var(--text2); display:flex; align-items:center; flex-shrink:0;
}
/* Thicker, more visible progress bar */
.ptrack {
  flex:1; height:8px; background:var(--bd2);
  border-radius:4px; overflow:hidden;
}
.pfill {
  height:100%; background:var(--ocean);
  border-radius:4px;
  transition:width .55s cubic-bezier(.4,0,.2,1);
}

/* Diamond counter in quiz bar */
.diamond-counter {
  display: flex; align-items: center; gap: 4px;
  flex-shrink: 0;
  position: relative;
}
.dicon { font-size: 18px; line-height:1; }
.dcount {
  font-size: 14px; font-weight: 800;
  color: var(--diamond);
  min-width: 18px;
  transition: transform .2s;
}
/* Diamond burst canvas */
#dc { position:fixed; inset:0; width:100%; height:100%; pointer-events:none; z-index:998; }

/* +1 float label */
.diamond-plus {
  position: absolute;
  top: -4px; right: -2px;
  font-size: 13px; font-weight: 800;
  color: var(--diamond);
  animation: dplus .7s ease-out forwards;
  pointer-events: none;
}
@keyframes dplus {
  0%  { opacity:1; transform:translateY(0) scale(1.2); }
  100%{ opacity:0; transform:translateY(-24px) scale(.8); }
}
.gear-btn {
  background:none; border:none; cursor:pointer; padding:4px;
  -webkit-tap-highlight-color:transparent;
  color:var(--text2); display:flex; align-items:center; flex-shrink:0;
}

/* Content area */
.content {
  flex:1; width:100%; max-width:500px;
  display:flex; flex-direction:column;
  padding:0 14px; gap:10px; min-height:0;
}

/* Target card — fixed height for 4:3 photo */
.target-card {
  background:var(--surf);
  border-radius:var(--r); border:1px solid var(--bd); box-shadow:var(--sh);
  display:flex; align-items:center; justify-content:center;
  height:220px; flex-shrink:0;
  overflow:hidden; padding:0;
}
.target-img {
  width:100%; height:100%;
  border-radius:var(--r);
  background:var(--surf2);
  display:flex; align-items:center; justify-content:center;
  font-size:140px; line-height:1;
  overflow:hidden;
  animation:imgPop .38s cubic-bezier(.34,1.56,.64,1);
}
/* When real <img> is used inside target-img */
.target-img img {
  width:100%; height:100%;
  object-fit:cover; object-position:center;
  border-radius:var(--r);
  display:block;
}
@keyframes imgPop{from{transform:scale(.78);opacity:0}to{transform:scale(1);opacity:1}}
.instr {
  display:flex; align-items:center; justify-content:center;
  gap:7px; transition:opacity .3s; flex-shrink:0;
  padding:2px 0;
}
.dots  { display:flex; gap:4px; }
.dot   { width:7px; height:7px; border-radius:50%; background:var(--ocean); animation:dp 1.5s ease-in-out infinite; }
.dot:nth-child(2){animation-delay:.17s}.dot:nth-child(3){animation-delay:.34s}
@keyframes dp{0%,70%,100%{transform:scale(.5);opacity:.3}35%{transform:scale(1);opacity:1}}
.instr-txt { font-size:14px; color:var(--text2); font-weight:500; }

/* Options zone — fills remaining space */
.opts-zone {
  flex:1; min-height:0; display:flex; flex-direction:column;
  background:var(--surf2); border-radius:var(--r);
  border:1px solid var(--bd); padding:8px;
}
.opts {
  display:grid; grid-template-columns:1fr 1fr; gap:8px;
  flex:1; min-height:0;
}
.opt {
  background:var(--surf); border:2px solid var(--bd2);
  border-radius:var(--rsm); cursor:pointer; outline:none;
  -webkit-tap-highlight-color:transparent; touch-action:manipulation;
  position:relative; overflow:hidden;
  display:flex; align-items:center; justify-content:center;
  transition:border-color .18s, background .18s, transform .1s, opacity .2s;
  min-height:0;
}
.opt:active{transform:scale(.965)}
.otxt {
  font-size:24px; font-weight:700;
  color:var(--text); text-align:center; line-height:1.2;
  word-break:keep-all; transition:color .18s;
}
.rpl  { position:absolute; border-radius:50%; background:var(--blue-lt); transform:scale(0); animation:rout .5s ease-out forwards; pointer-events:none; }
@keyframes rout{to{transform:scale(5);opacity:0}}
.opt.sel { border-color:var(--ocean); background:var(--blue-bg); }
.opt.sel .otxt { color:var(--ocean); }
.opt.sel::after { content:''; position:absolute; inset:-3px; border-radius:calc(var(--rsm)+4px); border:2px solid var(--ocean); animation:blink 2s ease infinite; pointer-events:none; }
@keyframes blink{0%{opacity:.55;transform:scale(1)}100%{opacity:0;transform:scale(1.02)}}
.opt.correct { border-color:var(--green); background:var(--green-bg); }
.opt.correct .otxt { color:var(--green); }
.opt.correct::after { display:none; }
.opt.wrong  { border-color:var(--bd2); background:var(--surf2); opacity:.35; }
.opt.wrong::after { display:none; }
.opt.dim    { opacity:.25; pointer-events:none; }
.opt.dim::after { display:none; }

/* Answer panel — same fixed height as opts-zone area */
.answer-panel {
  flex:1; min-height:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background:var(--surf); border-radius:var(--r);
  border:1px solid var(--bd); box-shadow:var(--sh);
  padding:18px 20px 14px; overflow:hidden;
  opacity:0; transform:scale(.96);
  transition:opacity .3s, transform .3s cubic-bezier(.34,1.56,.64,1);
}
.answer-panel.show { opacity:1; transform:scale(1); }
.answer-word {
  font-size:48px; font-weight:800; letter-spacing:-1px;
  color:var(--text); line-height:1; text-align:center;
  flex-shrink:0; margin-bottom:14px;
}
.answer-details {
  width:100%; display:flex; flex-direction:column;
  gap:7px; overflow:hidden; flex-shrink:1;
}
.detail-item {
  display:flex; align-items:flex-start; gap:10px;
  padding:9px 13px; background:var(--surf2); border-radius:12px;
  flex-shrink:0; opacity:0; transform:translateY(6px);
  transition:opacity .3s, transform .3s;
}
.detail-item.show { opacity:1; transform:translateY(0); }
.detail-dot { width:6px; height:6px; border-radius:50%; background:var(--ocean); flex-shrink:0; margin-top:8px; }
.detail-txt { font-size:15px; font-weight:500; color:var(--text2); line-height:1.5; }

/* Bottom */
.btm {
  width:100%; max-width:500px; flex-shrink:0;
  padding: 10px 14px calc(12px + env(safe-area-inset-bottom, 20px));
  display:flex; flex-direction:column; gap:10px;
}
.subbtn {
  width:100%; height:64px; border-radius:var(--r);
  border:2px solid var(--bd2);
  background:var(--surf); color:var(--text2);
  font-family:inherit; font-size:17px; font-weight:700;
  cursor:pointer; outline:none;
  -webkit-tap-highlight-color:transparent; touch-action:manipulation;
  display:flex; align-items:center; justify-content:center;
  position:relative; overflow:visible;
  transition:background .28s, border-color .28s, color .28s, box-shadow .28s, opacity .22s, transform .18s;
}
.subbtn:active{transform:scale(.97)}
.subbtn.on {
  background:var(--ocean); border-color:var(--ocean); color:#fff;
  box-shadow:0 4px 0 var(--ocean-dk);
}
.subbtn.on:active { transform:translateY(2px); box-shadow:0 2px 0 var(--ocean-dk); }
.subbtn.gone { opacity:0; pointer-events:none; height:0; margin:0; padding:0; border:none; overflow:hidden; transition:height .22s, opacity .18s; }
.ntip {
  position:absolute; bottom:calc(100% + 9px); left:50%;
  transform:translateX(-50%) scale(.9);
  background:var(--text); color:var(--bg);
  font-size:13px; font-weight:500; padding:8px 16px;
  border-radius:11px; white-space:nowrap;
  opacity:0; pointer-events:none;
  transition:opacity .2s, transform .2s; z-index:20;
}
.ntip::after { content:''; position:absolute; top:100%; left:50%; transform:translateX(-50%); border:5px solid transparent; border-top-color:var(--text); }
.ntip.show { opacity:1; transform:translateX(-50%) scale(1); }
@keyframes ndg{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
.ndg{animation:ndg .32s ease}
.nxtbtn {
  width:100%; height:0; overflow:hidden; border-radius:var(--r); border:none;
  background:var(--ocean); color:#fff;
  font-family:inherit; font-size:20px; font-weight:800;
  cursor:pointer; outline:none;
  -webkit-tap-highlight-color:transparent; touch-action:manipulation;
  display:flex; align-items:center; justify-content:center; gap:10px;
  opacity:0; transform:translateY(8px);
  transition:height .3s cubic-bezier(.34,1.56,.64,1), opacity .25s, transform .3s cubic-bezier(.34,1.56,.64,1);
  position:relative; overflow:hidden; flex-shrink:0;
  box-shadow:0 4px 0 var(--ocean-dk);
}
.nxtbtn.show { height:66px; opacity:1; transform:translateY(0); overflow:hidden; }
.nxtbtn:active{ transform:translateY(2px); box-shadow:0 2px 0 var(--ocean-dk); }
.nring-svg { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
.nring-t { fill:none; stroke:rgba(255,255,255,.14); stroke-width:3; }
.nring-p { fill:none; stroke:rgba(255,255,255,.72); stroke-width:3; stroke-linecap:round; }
.nring-lbl { position:relative; z-index:1; }
.nring-sec { position:relative; z-index:1; font-size:13px; font-weight:600; opacity:.6; min-width:16px; }

/* Slide */
.content { transition:opacity .2s, transform .2s; }
.sout{opacity:0;transform:translateX(-22px)}
.sin {opacity:0;transform:translateX(22px)}

/* ════════════════════════════════
   SETTINGS DRAWER
   ════════════════════════════════ */
.settings-overlay {
  position:fixed; inset:0; z-index:200;
  background:rgba(0,0,0,0); pointer-events:none;
  transition:background .28s;
}
.settings-overlay.open { background:rgba(0,0,0,0.38); pointer-events:auto; }
.settings-sheet {
  position:absolute; bottom:0; left:50%;
  transform:translateX(-50%) translateY(100%);
  width:100%; max-width:500px;
  background:var(--surf); border-radius:24px 24px 0 0;
  border-top:0.5px solid var(--bd); padding:0 0 calc(16px + env(safe-area-inset-bottom, 16px));
  transition:transform .32s cubic-bezier(.32,1,.36,1);
}
.settings-overlay.open .settings-sheet { transform:translateX(-50%) translateY(0); }
.sheet-handle { width:36px; height:4px; border-radius:2px; background:var(--bd2); margin:12px auto 0; }
.sheet-title { font-size:15px; font-weight:700; color:var(--text); padding:14px 20px 10px; border-bottom:0.5px solid var(--bd); }
.sheet-section { padding:14px 20px 0; }
.sheet-section-lbl { font-size:11px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:.08em; margin-bottom:10px; }
.sheet-row { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:0.5px solid var(--bd); }
.sheet-row:last-child { border-bottom:none; }
.sheet-row-lbl { flex:1; font-size:15px; font-weight:500; color:var(--text); }
.sheet-row-val { font-size:14px; font-weight:700; color:var(--blue); min-width:34px; text-align:right; }
.sheet-row input[type=range] { width:130px; accent-color:var(--blue); cursor:pointer; }
.stoggle { position:relative; width:44px; height:26px; flex-shrink:0; cursor:pointer; -webkit-tap-highlight-color:transparent; }
.stoggle input { opacity:0; width:0; height:0; position:absolute; }
.stoggle-track { position:absolute; inset:0; background:var(--bd2); border-radius:13px; transition:background .25s; }
.stoggle input:checked + .stoggle-track { background:var(--blue); }
.stoggle-thumb { position:absolute; top:3px; left:3px; width:20px; height:20px; border-radius:50%; background:#fff; box-shadow:0 1px 4px rgba(0,0,0,.25); transition:transform .25s cubic-bezier(.34,1.56,.64,1); pointer-events:none; }
.stoggle input:checked ~ .stoggle-thumb { transform:translateX(18px); }

/* Confetti + jelly */
#cc { position:fixed; inset:0; width:100%; height:100%; pointer-events:none; z-index:999; }
@keyframes jelly{0%,100%{transform:scale(1)}20%{transform:scale(1.14,.86)}40%{transform:scale(.89,1.11)}60%{transform:scale(1.06,.95)}80%{transform:scale(.98,1.02)}}
.jly{animation:jelly .42s ease}

/* Icon SVG helper */
.ico { display:inline-flex; align-items:center; justify-content:center; }
</style>
</head>
<body>
<canvas id="cc"></canvas>
<canvas id="dc"></canvas>

<!-- ══════════════ HOME SCREEN ══════════════ -->
<div class="screen active" id="screen-home">

  <div class="home-scroll">
    <!-- Duolingo-style top bar -->
    <div class="home-topbar">
      <div class="home-title-wrap">
        <span class="home-title">忆海拾光</span>
        <span class="home-version">v0.2</span>
        <button class="home-refresh-btn" onclick="forceRefresh()" aria-label="强制刷新">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
        </button>
      </div>
      <div class="home-icons">
        <!-- streak -->
        <div class="home-icon-btn">
          <span class="home-icon-emoji">🔥</span>

  { key:'daily',     name:'日常用品' },
  { key:'fruit',     name:'水果'     },
  { key:'veg',       name:'蔬菜'     },
  { key:'transport', name:'交通工具' },
  { key:'furniture', name:'家具'     },
];

function getDeck(key) {
  if (key === 'random') {
    const all = Object.entries(DECKS)
      .filter(([k]) => k !== 'random')
      .flatMap(([, cards]) => cards);
    return all.sort(() => Math.random() - .5).slice(0, 8);
  }
  return DECKS[key] || [];
}

function renderDeckList() {
  const grid = document.getElementById('deck-grid');
  grid.innerHTML = DECKS_META.map((m, i) => {
    const isRandom = m.key === 'random';
    const stats = isRandom ? { due: '—', new: '—' } : getDeckStats(m.key);
    const dueVal = isRandom ? '—' : (stats.due > 0 ? stats.due : '0');
    const newVal = isRandom ? '—' : (stats.new > 0 ? stats.new : '0');
    return `<div class="deck-card${i===0?' selected':''}" data-deck="${m.key}" onclick="selectDeck(this)">
      <div class="deck-info"><div class="deck-name">${m.name}</div></div>
      <div class="deck-stats">
        <div class="deck-stat"><span class="deck-stat-num due" data-deck="${m.key}">${dueVal}</span><span class="deck-stat-lbl">到期</span></div>
        <div class="deck-stat"><span class="deck-stat-num new-c" data-deck="${m.key}">${newVal}</span><span class="deck-stat-lbl">新卡</span></div>
      </div>
    </div>`;
  }).join('');
}

  el.classList.add('selected');
  currentDeck = el.dataset.deck;
}
// Simulated SRS stats — in a real app these come from a spaced-repetition engine.
// For now: "due" = cards whose last-seen date <= today, "new" = never seen.
function getDeckStats(key) {
  if (key === 'random') return { due: null, new: null };
  const seen   = JSON.parse(localStorage.getItem(`seen_${key}`)  || '{}');
  const deck   = DECKS[key] || [];
  const today  = new Date().toDateString();
  let due = 0, newC = 0;
  deck.forEach((_, i) => {
    const s = seen[i];
    if (!s) { newC++; }
    else if (s.next && new Date(s.next) <= new Date()) { due++; }
  });
  return { due, new: newC };
}

function updateDeckStats() {
  DECKS_META.filter(m => m.key !== 'random').forEach(m => {
    const stats = getDeckStats(m.key);
    const dueEl = document.querySelector(`.deck-stat-num.due[data-deck="${m.key}"]`);
    const newEl = document.querySelector(`.deck-stat-num.new-c[data-deck="${m.key}"]`);
    if (dueEl) dueEl.textContent = stats.due > 0 ? stats.due : '0';
    if (newEl) newEl.textContent = stats.new > 0 ? stats.new : '0';
  });
}

function startBrowse() {
  warmupSpeech();
  _launch('browse');
}
function startQuiz() {
  warmupSpeech();
  _launch('quiz');
}
function _launch(mode) {
  currentMode = mode;
  Qs = getDeck(currentDeck);
  if (mode === 'browse') Qs = Qs.map(q => ({ ...q, browse: true }));
  qIdx = 0;
  document.getElementById('nxt-lbl').textContent = mode === 'browse' ? '下一张' : '下一题';
  showScreen('screen-quiz');
  render();
}
function goHome() {
  stopNRing(); stopAllPromptTimers();
  speechSynthesis.cancel();
  document.getElementById('home-diamond-count').textContent = diamonds;
  renderDeckList();
  updateDeckStats();
  updateStreak();
  showScreen('screen-home');
}

function updateStreak() {
  const streak = parseInt(localStorage.getItem('streak') || '0');
  const el = document.getElementById('home-streak');
  if (el) el.textContent = streak;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.remove('active', 'exit-left');
    if (s.id !== id) s.classList.add('exit-left');
  });
  document.getElementById(id).classList.add('active');
  document.getElementById(id).classList.remove('exit-left');
}

// ── Prompt timers ──────────────────────────────────────────────
let tSelTimer = null, tConfTimer = null;
function startSelectTimer() {
  clearSelectTimer();
  tSelTimer = setTimeout(() => { if (!revealed && sel === null) speak('请选择答案'); }, THRESH);
}
function clearSelectTimer() { if (tSelTimer) { clearTimeout(tSelTimer); tSelTimer = null; } }
function startConfirmTimer() {
  clearConfirmTimer();
  tConfTimer = setTimeout(() => { if (!revealed && sel !== null) speak('请确认答案'); }, THRESH);
}
function clearConfirmTimer() { if (tConfTimer) { clearTimeout(tConfTimer); tConfTimer = null; } }
function stopAllPromptTimers() { clearSelectTimer(); clearConfirmTimer(); speechSynthesis.cancel(); }

function onThreshChange(v) {
  THRESH = parseFloat(v) * 1000;
  document.getElementById('dbg-thresh-val').textContent = `${v}s`;
  if (tSelTimer)  { clearSelectTimer();  startSelectTimer(); }
  if (tConfTimer) { clearConfirmTimer(); startConfirmTimer(); }
}
function onDelayChange(v) {
  SPEAK_DELAY = parseFloat(v) * 1000;
  document.getElementById('dbg-delay-val').textContent = `${parseFloat(v).toFixed(1)}s`;
}

// ── Audio ──────────────────────────────────────────────────────
let ac = null;
function getAC() {
  if (!ac) ac = new (window.AudioContext || window.webkitAudioContext)();
  if (ac.state === 'suspended') ac.resume();
  return ac;
}
function tone(t) {
  const a = getAC(), now = a.currentTime;
  const n = (f,st,d,v,w) => {
    const o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);
    o.type=w||'sine';o.frequency.value=f;
    g.gain.setValueAtTime(v||.2,st);g.gain.exponentialRampToValueAtTime(.001,st+d);
    o.start(st);o.stop(st+d+.01);
  };
  if (t==='sel')  { n(900,now,.05,.2);n(1200,now+.04,.07,.14); }
  if (t==='ok')   { [[523,0],[659,.1],[784,.2],[1047,.32],[1319,.45]].forEach(([f,d])=>n(f,now+d,.18,.22)); }
  if (t==='clk')  { n(780,now,.06,.18); }
  if (t==='next') { n(880,now,.05,.15);n(1100,now+.06,.08,.11); }
  if (t==='diamond') { [[1319,0],[1568,.06],[1760,.12]].forEach(([f,d])=>n(f,now+d,.12,.18)); }
}

// ── Speech ─────────────────────────────────────────────────────
let voices = [];
let speechReady = false;

function loadVoices() {
  const v = speechSynthesis.getVoices();
  if (v.length) voices = v;
}
loadVoices();
if (typeof speechSynthesis.onvoiceschanged !== 'undefined') {
  speechSynthesis.onvoiceschanged = loadVoices;
}

// iOS: warm up speech engine on first user gesture
// Call this inside any click/touch handler before the first real speak
function warmupSpeech() {
  if (speechReady) return;
  speechReady = true;
  const utt = new SpeechSynthesisUtterance('');
  utt.volume = 0;
  speechSynthesis.speak(utt);
  // Also try loading voices now (iOS sometimes loads them after user gesture)
  setTimeout(() => { loadVoices(); }, 300);
}

function pickVoice() {
  // Reload voices in case they weren't available at init
  if (!voices.length) loadVoices();
  return voices.find(v => v.lang === 'zh-CN')
      || voices.find(v => v.lang === 'zh-TW')
      || voices.find(v => v.lang.startsWith('zh'))
      || (voices.length ? voices[0] : null);
}

function speak(text, delay = 0) {
  speechSynthesis.cancel();
  const go = () => {
    // On iOS, if voices still empty after warmup, retry once
    if (!voices.length) loadVoices();
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'zh-CN';
    utt.rate = 0.85;
    utt.pitch = 1.0;
    utt.volume = 1;
    const v = pickVoice();
    if (v) utt.voice = v;
    speechSynthesis.speak(utt);
    // iOS bug: sometimes pauses after starting
    setTimeout(() => {
      if (speechSynthesis.paused) speechSynthesis.resume();
    }, 250);
  };
  if (delay > 0) setTimeout(go, delay);
  else go();
}

// ── Diamond ────────────────────────────────────────────────────
let dRaf = null;
function addDiamond() {
  diamonds++;
  const el = document.getElementById('dcount');
  el.textContent = diamonds;
  el.style.transform = 'scale(1.5)';
  setTimeout(() => el.style.transform = '', 250);
  // floating +1 label
  const counter = document.getElementById('diamond-counter');
  const plus = document.createElement('span');
  plus.className = 'diamond-plus'; plus.textContent = '+1';
  counter.appendChild(plus);
  plus.addEventListener('animationend', () => plus.remove());
  tone('diamond');
  // particle burst from diamond icon position
  const rect = counter.getBoundingClientRect();
  spawnDiamondBurst(rect.left + rect.width/2, rect.top + rect.height/2);
}

function spawnDiamondBurst(ox, oy) {
  const cv = document.getElementById('dc'), ctx = cv.getContext('2d');
  cv.width = window.innerWidth; cv.height = window.innerHeight;
  const cols = ['#06b6d4','#a5f3fc','#67e8f9','#0891b2','#ffffff'];
  const ps = Array.from({length:22}, () => {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 5 + 2;
    return {
      x: ox, y: oy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      r: Math.random() * 4 + 2,
      color: cols[Math.floor(Math.random()*cols.length)],
      life: 1
    };
  });
  cancelAnimationFrame(dRaf);
  (function draw() {
    ctx.clearRect(0,0,cv.width,cv.height);
    let alive = false;
    ps.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.vy += .18; p.life -= .04;
      if (p.life > 0) { alive = true; }
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = p.color;
      ctx.fill();
      ctx.restore();
    });
    if (alive) dRaf = requestAnimationFrame(draw);
    else ctx.clearRect(0,0,cv.width,cv.height);
  })();
}

// ── Render ─────────────────────────────────────────────────────
function render() {
  const q = Qs[qIdx];
  sel = null; revealed = false;

  document.getElementById('pfill').style.width = `${(qIdx / Qs.length) * 100}%`;

  const timg = document.getElementById('timg');
  timg.style.animation='none'; void timg.offsetWidth; timg.style.animation='';
  timg.textContent = q.img;

  const instr = document.getElementById('instr');
  instr.style.opacity='1'; instr.style.transition='';

  // Browse mode: skip options, auto-reveal
  if (q.browse) {
    document.getElementById('opts-zone').style.display = 'none';
    document.getElementById('subbtn').className = 'subbtn gone';
    revealBrowse(q);
    return;
  }

  const opts = document.getElementById('opts');
  opts.innerHTML = '';
  q.options.forEach((txt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<div class="otxt">${txt}</div>`;
    btn.ontouchstart = () => {};
    btn.addEventListener('click', e => onSel(e, i, btn));
    opts.appendChild(btn);
  });

  document.getElementById('opts-zone').style.display = '';
  document.getElementById('subbtn').className = 'subbtn';
  document.getElementById('sublbl').textContent = '确认答案';
  document.getElementById('answer-panel').className = 'answer-panel';
  document.getElementById('nxtbtn').className = 'nxtbtn';
  stopNRing();
  stopAllPromptTimers();
  startSelectTimer();
}

function revealBrowse(q) {
  const answerName = q.name || q.options[q.correct];
  document.getElementById('answer-panel').className = 'answer-panel';
  document.getElementById('ans-word').textContent = answerName;
  document.getElementById('ans-word').className = 'answer-word';
  const detailsEl = document.getElementById('ans-details');
  detailsEl.innerHTML = '';
  (q.details||[]).forEach((txt,i) => {
    const item = document.createElement('div');
    item.className='detail-item';
    item.innerHTML=`<div class="detail-dot"></div><div class="detail-txt">${txt}</div>`;
    detailsEl.appendChild(item);
    setTimeout(()=>item.classList.add('show'), 300 + i*120);
  });
  setTimeout(()=>document.getElementById('answer-panel').classList.add('show'), 30);
  speak(answerName, SPEAK_DELAY);
  setTimeout(()=>{
    const nb=document.getElementById('nxtbtn');
    nb.classList.add('show');
    startNRing();
  }, 320);
}

// ── Select ─────────────────────────────────────────────────────
function onSel(e, idx, btn) {
  if (revealed) return;
  const r = document.createElement('span');
  const d = Math.max(btn.offsetWidth, btn.offsetHeight);
  const rc = btn.getBoundingClientRect();
  r.className='rpl';
  r.style.cssText=`width:${d}px;height:${d}px;left:${(e.touches?.[0]?.clientX??e.clientX)-rc.left-d/2}px;top:${(e.touches?.[0]?.clientY??e.clientY)-rc.top-d/2}px`;
  btn.appendChild(r); r.addEventListener('animationend',()=>r.remove());

  if (sel===idx) {
    btn.classList.remove('sel'); sel=null;
    document.getElementById('subbtn').classList.remove('on');
    const instr=document.getElementById('instr'); instr.style.transition='opacity .25s'; instr.style.opacity='1';
    clearConfirmTimer(); startSelectTimer(); return;
  }
  document.querySelectorAll('.opt').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel'); sel=idx; tone('sel');
  document.getElementById('subbtn').classList.add('on');
  const instr=document.getElementById('instr'); instr.style.transition='opacity .28s'; instr.style.opacity='0';
  clearSelectTimer(); startConfirmTimer();
}

// ── Submit ─────────────────────────────────────────────────────
function onSubmit() {
  if (revealed) return;
  if (sel===null) {
    const sb=document.getElementById('subbtn');
    sb.classList.remove('ndg'); void sb.offsetWidth; sb.classList.add('ndg');
    sb.addEventListener('animationend',()=>sb.classList.remove('ndg'),{once:true});
    document.getElementById('ntip').classList.add('show');
    setTimeout(()=>document.getElementById('ntip').classList.remove('show'),2000);
    tone('clk'); return;
  }
  revealAnswer();
}

// ── Reveal ─────────────────────────────────────────────────────
function revealAnswer() {
  revealed=true; stopAllPromptTimers();
  const q=Qs[qIdx], isOk=sel===q.correct;
  const answerName = q.name || q.options[q.correct];

  document.getElementById('opts-zone').style.display='none';
  const panel=document.getElementById('answer-panel');
  document.getElementById('ans-word').textContent=answerName;
  document.getElementById('ans-word').className='answer-word';
  const detailsEl=document.getElementById('ans-details');
  detailsEl.innerHTML='';
  (q.details||[]).forEach((txt,i)=>{
    const item=document.createElement('div');
    item.className='detail-item';
    item.innerHTML=`<div class="detail-dot"></div><div class="detail-txt">${txt}</div>`;
    detailsEl.appendChild(item);
    setTimeout(()=>item.classList.add('show'), 350+i*120);
  });
  setTimeout(()=>panel.classList.add('show'),30);

  if (isOk) { tone('ok'); setTimeout(spawnConfetti,200); setTimeout(addDiamond,400); }

  speak(answerName, SPEAK_DELAY);
  document.getElementById('subbtn').classList.add('gone');
  setTimeout(()=>{
    const nb=document.getElementById('nxtbtn');
    nb.classList.add('show');
    nb.classList.remove('jly'); void nb.offsetWidth; nb.classList.add('jly');
    nb.addEventListener('animationend',()=>nb.classList.remove('jly'),{once:true});
    startNRing();
  },320);
}

// ── Next ───────────────────────────────────────────────────────
function onNext() {
  stopNRing(); stopAllPromptTimers(); speechSynthesis.cancel(); tone('next');
  qIdx=(qIdx+1)%Qs.length;
  const ct=document.getElementById('content');
  ct.classList.add('sout');
  setTimeout(()=>{
    render();
    ct.classList.remove('sout'); ct.classList.add('sin');
    void ct.offsetWidth; ct.classList.remove('sin');
  },200);
}

// ── Next ring ──────────────────────────────────────────────────
function startNRing() {
  const btn=document.getElementById('nxtbtn'),svg=document.getElementById('nrsvg');
  const nrt=document.getElementById('nrt'),nrp=document.getElementById('nrp'),sec=document.getElementById('nrsec');
  const w=btn.offsetWidth,h=btn.offsetHeight,pad=2;
  svg.setAttribute('viewBox',`0 0 ${w} ${h}`);
  [nrt,nrp].forEach(el=>{el.setAttribute('x',pad);el.setAttribute('y',pad);el.setAttribute('width',w-pad*2);el.setAttribute('height',h-pad*2);el.setAttribute('rx',20);});
  const r=20,perim=2*((w-2*r)+(h-2*r))+2*Math.PI*r;
  nrt.style.strokeDasharray=perim;nrt.style.strokeDashoffset=0;
  nrp.style.strokeDasharray=perim;nrp.style.strokeDashoffset=perim;
  nStart=performance.now();
  function tick(now){
    const el=now-nStart,p=Math.min(el/NDUR,1);
    nrp.style.strokeDashoffset=perim*(1-p);
    const rem=Math.ceil((NDUR-el)/1000);
    sec.textContent=rem>0?rem:'';
    if(p<1){nRaf=requestAnimationFrame(tick);}
    else{sec.textContent='';onNext();}
  }
  nRaf=requestAnimationFrame(tick);
}
function stopNRing(){
  if(nRaf){cancelAnimationFrame(nRaf);nRaf=null;}
  const nrp=document.getElementById('nrp'),sec=document.getElementById('nrsec');
  if(nrp)nrp.style.strokeDashoffset='9999';
  if(sec)sec.textContent='';
}

// ── Confetti ───────────────────────────────────────────────────
let cRaf=null;
function spawnConfetti(){
  const cv=document.getElementById('cc'),ctx=cv.getContext('2d');
  cv.width=window.innerWidth;cv.height=window.innerHeight;
  const cols=['#1d4ed8','#15803d','#b45309','#be185d','#7c3aed','#0891b2'];
  const ps=Array.from({length:90},()=>({x:Math.random()*cv.width,y:-12-Math.random()*50,vx:(Math.random()-.5)*6,vy:Math.random()*3+2,color:cols[Math.floor(Math.random()*cols.length)],w:Math.random()*9+4,h:Math.random()*4+3,rot:Math.random()*360,rs:(Math.random()-.5)*8,wb:Math.random()*3}));
  let f=0; cancelAnimationFrame(cRaf);
  (function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);let alive=false;
    ps.forEach(p=>{p.x+=p.vx+Math.sin(f*.05+p.wb)*.4;p.y+=p.vy;p.vy+=.065;p.rot+=p.rs;if(p.y<cv.height+20)alive=true;ctx.save();ctx.globalAlpha=Math.max(0,1-p.y/(cv.height*1.1));ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();});
    f++;if(alive)cRaf=requestAnimationFrame(draw);else ctx.clearRect(0,0,cv.width,cv.height);
  })();
}

// ── Force refresh (PWA) ───────────────────────────────────────
function forceRefresh() {
  const btn = document.querySelector('.home-refresh-btn');
  if (btn) {
    btn.classList.add('spinning');
    btn.addEventListener('animationend', () => btn.classList.remove('spinning'), { once: true });
  }
  // Clear caches if Service Worker available, then reload
  if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
    navigator.serviceWorker.getRegistrations().then(regs => {
      Promise.all(regs.map(r => r.unregister())).then(() => {
        if ('caches' in window) {
          caches.keys().then(keys =>
            Promise.all(keys.map(k => caches.delete(k)))
          ).then(() => location.reload(true));
        } else { location.reload(true); }
      });
    });
  } else {
    setTimeout(() => location.reload(true), 400);
  }
}

function openSettings(){ document.getElementById('settings-overlay').classList.add('open'); }
function closeSettings(){ document.getElementById('settings-overlay').classList.remove('open'); }
function closeSettingsIfOutside(e){ if(e.target===document.getElementById('settings-overlay'))closeSettings(); }

// ── Theme ──────────────────────────────────────────────────────
function toggleTheme(checkbox){
  const isDark=checkbox?checkbox.checked:!document.documentElement.classList.contains('dark');
  document.documentElement.classList.toggle('dark',isDark);
  localStorage.setItem('theme',isDark?'dark':'light');
  const tog=document.getElementById('dark-toggle');if(tog)tog.checked=isDark;
}
(function(){
  const s=localStorage.getItem('theme'),sys=window.matchMedia('(prefers-color-scheme: dark)').matches;
  const isDark=s?s==='dark':sys;
  if(isDark)document.documentElement.classList.add('dark');
  window.addEventListener('load',()=>{
    const tog=document.getElementById('dark-toggle');if(tog)tog.checked=isDark;
    renderDeckList();
    updateDeckStats();
    updateStreak();
  });
})();
