<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>胜利按钮</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎉</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0a0a1a;
      --bg-light: #1a1a3a;
      --complete-color: #2dd4bf;
      --complete-glow: #5eead4;
      --victory-color: #f59e0b;
      --victory-glow: #fbbf24;
      --text-white: #ffffff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      touch-action: manipulation;
    }

    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-light) 50%, var(--bg-dark) 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      position: relative;
    }

    /* 背景星光效果 */
    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      opacity: 0;
      animation: twinkle 3s infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0; }
      50% { opacity: 0.8; }
    }

    .title {
      font-size: clamp(1.5rem, 5vw, 2rem);
      font-weight: 700;
      color: var(--text-white);
      text-align: center;
      margin-bottom: 0.5rem;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
      position: relative;
      z-index: 1;
    }

    .version {
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.4);
      text-align: center;
      margin-bottom: 2.5rem;
      position: relative;
      z-index: 1;
    }

    .button-container {
      display: flex;
      flex-direction: column;
      gap: 24px;
      position: relative;
      z-index: 10;
    }

    .btn {
      width: 200px;
      height: 56px;
      border: none;
      border-radius: 28px;
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--bg-dark);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.2s ease;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .btn-complete {
      background: linear-gradient(135deg, var(--complete-color), var(--complete-glow));
      box-shadow: 0 4px 20px rgba(45, 212, 191, 0.4);
    }

    .btn-complete:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 30px rgba(45, 212, 191, 0.6);
    }

    .btn-complete:active {
      transform: scale(0.95) translateY(2px);
      box-shadow: 0 2px 10px rgba(45, 212, 191, 0.3);
    }

    .btn-victory {
      background: linear-gradient(135deg, var(--victory-color), var(--victory-glow));
      box-shadow: 0 4px 20px rgba(245, 158, 11, 0.4);
    }

    .btn-victory:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 30px rgba(245, 158, 11, 0.6);
    }

    .btn-victory:active {
      transform: scale(0.95) translateY(2px);
      box-shadow: 0 2px 10px rgba(245, 158, 11, 0.3);
    }

    /* 波纹效果 */
    .ripple {
      position: absolute;
      border-radius: 50%;
      border: 4px solid rgba(255, 255, 255, 0.9);
      background: transparent;
      transform: scale(0);
      animation: ripple-anim 0.6s ease-out;
      pointer-events: none;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.2);
    }

    @keyframes ripple-anim {
      0% {
        transform: scale(0);
        opacity: 1;
      }
      100% {
        transform: scale(8);
        opacity: 0;
      }
    }

    /* 烟花容器 */
    .fireworks-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 100;
      overflow: hidden;
    }

    .firework {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    /* 屏幕闪烁 */
    .flash {
      animation: screen-flash 0.3s ease-out;
    }

    @keyframes screen-flash {
      0% { filter: brightness(1); }
      50% { filter: brightness(1.3); }
      100% { filter: brightness(1); }
    }

    /* 添加到主屏幕提示 */
    .install-hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.1);
      padding: 10px 20px;
      border-radius: 20px;
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.85rem;
      backdrop-filter: blur(10px);
      z-index: 50;
    }
  </style>
</head>
<body>
  <!-- 背景星光 -->
  <div class="stars" id="stars"></div>

  <!-- 标题 -->
  <h1 class="title">✨ 轻轻一点 ✨</h1>
  <p class="version">V0.8</p>

  <!-- 按钮容器 -->
  <div class="button-container">
    <button class="btn btn-complete" id="completeBtn">完成</button>
    <button class="btn btn-victory" id="victoryBtn">通关</button>
  </div>

  <!-- 烟花容器 -->
  <div class="fireworks-container" id="fireworks"></div>

  <!-- 提示 -->
  <div class="install-hint">点击右上角 ••• 添加到主屏幕</div>

  <script>
    // 初始化背景星光
    function createStars() {
      const starsContainer = document.getElementById('stars');
      for (let i = 0; i < 50; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 3 + 's';
        star.style.animationDuration = (2 + Math.random() * 2) + 's';
        starsContainer.appendChild(star);
      }
    }
    createStars();

    // 音频上下文
    let audioCtx = null;

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      // iOS 需要恢复 suspended 状态的 AudioContext
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      return audioCtx;
    }

    // 生成金币音效
    function playCompleteSound() {
      const ctx = initAudio();
      const now = ctx.currentTime;

      // 金币碰撞主音 - 高频短促
      const osc1 = ctx.createOscillator();
      const gain1 = ctx.createGain();
      osc1.type = 'square'; // 方波更清脆
      osc1.frequency.setValueAtTime(3500, now);
      osc1.frequency.exponentialRampToValueAtTime(1500, now + 0.05);
      gain1.gain.setValueAtTime(0.4, now);
      gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
      osc1.connect(gain1);
      gain1.connect(ctx.destination);
      osc1.start(now);
      osc1.stop(now + 0.08);

      // 金币泛音 - 金属感
      const osc2 = ctx.createOscillator();
      const gain2 = ctx.createGain();
      osc2.type = 'sine';
      osc2.frequency.setValueAtTime(5000, now);
      osc2.frequency.exponentialRampToValueAtTime(2000, now + 0.03);
      gain2.gain.setValueAtTime(0.25, now);
      gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.06);
      osc2.connect(gain2);
      gain2.connect(ctx.destination);
      osc2.start(now);
      osc2.stop(now + 0.06);
    }

    // 生成收银机音效
    function playCashRegisterSound() {
      const ctx = initAudio();
      const now = ctx.currentTime;

      // 快速上升的音阶（收银机效果）
      const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
      const durations = [0.05, 0.05, 0.05, 0.15];

      notes.forEach((freq, i) => {
        const oscillator = ctx.createOscillator();
        const gainNode = ctx.createGain();

        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(freq, now);

        gainNode.gain.setValueAtTime(0.3, now + i * 0.05);
        gainNode.gain.exponentialRampToValueAtTime(0.01, now + i * 0.05 + durations[i]);

        oscillator.connect(gainNode);
        gainNode.connect(ctx.destination);

        oscillator.start(now + i * 0.05);
        oscillator.stop(now + i * 0.05 + durations[i]);
      });

      // 添加一个硬币落下的声音
      setTimeout(() => {
        const coinOsc = ctx.createOscillator();
        const coinGain = ctx.createGain();

        coinOsc.type = 'sine';
        coinOsc.frequency.setValueAtTime(2000, ctx.currentTime);
        coinOsc.frequency.exponentialRampToValueAtTime(500, ctx.currentTime + 0.1);

        coinGain.gain.setValueAtTime(0.2, ctx.currentTime);
        coinGain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);

        coinOsc.connect(coinGain);
        coinGain.connect(ctx.destination);

        coinOsc.start(ctx.currentTime);
        coinOsc.stop(ctx.currentTime + 0.15);
      }, 200);
    }

    // 创建波纹效果
    function createRipple(event, button) {
      const rect = button.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;

      const ripple = document.createElement('span');
      ripple.className = 'ripple';
      ripple.style.left = x + 'px';
      ripple.style.top = y + 'px';

      button.appendChild(ripple);

      setTimeout(() => ripple.remove(), 600);
    }

    // 烟花粒子类
    class FireworkParticle {
      constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.size = Math.random() * 5 + 3;
        this.speedX = (Math.random() - 0.5) * 15;
        this.speedY = (Math.random() - 0.5) * 15 - 5;
        this.gravity = 0.2;
        this.friction = 0.98;
        this.opacity = 1;
        this.decay = Math.random() * 0.015 + 0.01;
        this.element = document.createElement('div');
        this.element.className = 'firework';
        this.element.style.background = color;
        this.element.style.boxShadow = `0 0 ${this.size * 2}px ${color}`;
        this.updatePosition();
        document.getElementById('fireworks').appendChild(this.element);
      }

      updatePosition() {
        this.element.style.left = this.x + 'px';
        this.element.style.top = this.y + 'px';
        this.element.style.opacity = this.opacity;
        this.element.style.width = this.size + 'px';
        this.element.style.height = this.size + 'px';
      }

      update() {
        this.speedX *= this.friction;
        this.speedY *= this.friction;
        this.speedY += this.gravity;
        this.x += this.speedX;
        this.y += this.speedY;
        this.opacity -= this.decay;
        this.updatePosition();
        return this.opacity > 0;
      }

      remove() {
        this.element.remove();
      }
    }

    // 创建烟花效果
    function createFirework(x, y) {
      const colors = [
        '#ffd700', '#ff4757', '#70a1ff', '#7bed9f', '#a55eea',
        '#ff6b81', '#ffa502', '#2ed573', '#1e90ff', '#ff6348'
      ];
      const particles = [];
      const particleCount = Math.floor(Math.random() * 40) + 80;

      for (let i = 0; i < particleCount; i++) {
        const color = colors[Math.floor(Math.random() * colors.length)];
        particles.push(new FireworkParticle(x, y, color));
      }

      // 动画循环
      function animate() {
        let alive = false;
        particles.forEach(p => {
          if (p.update()) {
            alive = true;
          } else {
            p.remove();
          }
        });

        if (alive) {
          requestAnimationFrame(animate);
        }
      }
      animate();
    }

    // 屏幕闪烁效果
    function flashScreen() {
      document.body.classList.add('flash');
      setTimeout(() => {
        document.body.classList.remove('flash');
      }, 300);
    }

    // 完成按钮点击
    const completeBtn = document.getElementById('completeBtn');
    completeBtn.addEventListener('click', function(e) {
      createRipple(e, this);
      playCompleteSound();
    });

    // 通关按钮点击
    document.getElementById('victoryBtn').addEventListener('click', function(e) {
      createRipple(e, this);

      // 播放音效
      playCashRegisterSound();

      // 获取按钮中心位置
      const rect = this.getBoundingClientRect();
      const x = rect.left + rect.width / 2;
      const y = rect.top + rect.height / 2;

      // 创建烟花
      createFirework(x, y);

      // 多次烟花效果
      setTimeout(() => createFirework(x - 50, y - 30), 100);
      setTimeout(() => createFirework(x + 50, y - 20), 200);
      setTimeout(() => createFirework(x, y - 60), 300);

      // 屏幕闪烁
      flashScreen();
    });

    // PWA Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
